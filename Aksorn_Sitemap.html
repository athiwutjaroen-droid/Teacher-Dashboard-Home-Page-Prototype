<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>Aksorn — Platform Sitemap R1 & R2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:#f0eeea;
  --text2:#9b99a0;
  --text3:#5c5a63;

  --r1:#3b82f6;    --r1-dim:#1e3a5f;    --r1-bg:#0d1f3c;
  --p1:#f59e0b;    --p1-dim:#7c4a0a;    --p1-bg:#2d1a00;
  --p2:#10b981;    --p2-dim:#065f3a;    --p2-bg:#001f14;
  --p3:#8b5cf6;    --p3-dim:#4c1d95;    --p3-bg:#1a0845;
  --p4:#f43f5e;    --p4-dim:#881337;    --p4-bg:#2d0415;
  --hold:#6b7280;  --hold-bg:#1f2937;

  --conn-r1:rgba(59,130,246,0.3);
  --conn-p2:rgba(16,185,129,0.3);
  --conn-p3:rgba(139,92,246,0.3);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
  user-select:none;
}

/* ── Top bar */
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:rgba(15,17,23,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;
}
.logo{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.02em}
.logo span{color:var(--r1)}
.topbar-div{width:1px;height:16px;background:var(--border2)}
.topbar-title{font-size:12px;color:var(--text2)}

.legend{display:flex;gap:12px;margin-left:auto;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);cursor:pointer;padding:3px 8px;border-radius:6px;transition:all .15s}
.leg:hover{background:var(--border)}
.leg.dim{opacity:.35}
.leg-dot{width:8px;height:8px;border-radius:50%}

.controls{display:flex;gap:8px;align-items:center}
.ctrl-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{color:var(--text);border-color:var(--border2)}

/* ── Canvas */
#canvas-wrap{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab;
}
#canvas-wrap.grabbing{cursor:grabbing}
#canvas{
  position:absolute;
  transform-origin:0 0;
}

/* ── Phase label */
.phase-band{
  position:absolute;
  border-radius:12px;
  border:1px solid;
  pointer-events:none;
}
.phase-band-label{
  position:absolute;
  top:-22px;left:0;
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;
}

/* ── Node */
.node{
  position:absolute;
  border-radius:12px;
  border:1.5px solid;
  padding:10px 14px;
  cursor:pointer;
  transition:all .2s;
  min-width:140px;
}
.node:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.node.selected{box-shadow:0 0 0 2px #fff2,0 8px 24px rgba(0,0,0,.5)}
.node.dimmed{opacity:.2}

.node-phase{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.node-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.node-sub{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}
.node-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.node-tag{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:500}
.node-tag.teacher{background:rgba(21,128,61,.3);color:#4ade80}
.node-tag.student{background:rgba(29,78,216,.3);color:#93c5fd}
.node-tag.both{background:rgba(180,83,9,.3);color:#fcd34d}
.node-tag.hold{background:rgba(107,114,128,.3);color:#9ca3af}
.node-tag.api{background:rgba(139,92,246,.3);color:#c4b5fd}

/* ── SVG connections */
#svg-layer{
  position:absolute;top:0;left:0;
  pointer-events:none;
  overflow:visible;
}

/* ── Detail panel */
.detail{
  position:fixed;
  right:0;top:52px;bottom:0;
  width:320px;
  background:var(--surface);
  border-left:1px solid var(--border);
  padding:20px;
  overflow-y:auto;
  transform:translateX(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:50;
}
.detail.open{transform:translateX(0)}
.detail-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.detail-phase{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.detail-title{font-size:18px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.detail-obj{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.detail-section{margin-bottom:14px}
.detail-section h4{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.detail-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.detail-list li{font-size:12px;color:var(--text);padding:5px 8px 5px 20px;position:relative;background:var(--surface2);border-radius:6px;line-height:1.4}
.detail-list li::before{content:'→';position:absolute;left:8px;color:var(--text3);font-size:10px;top:7px}
.detail-list li.hold-item{background:var(--hold-bg);color:var(--text2)}
.detail-list li.hold-item::before{content:'⏸'}
.detail-connects{display:flex;flex-direction:column;gap:6px}
.conn-item{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.conn-item:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── Minimap */
.minimap{
  position:fixed;bottom:20px;right:20px;
  width:160px;height:100px;
  background:rgba(15,17,23,.8);
  border:1px solid var(--border2);
  border-radius:10px;
  overflow:hidden;
  z-index:60;
}
.minimap-viewport{
  position:absolute;
  border:1px solid rgba(255,255,255,.3);
  border-radius:3px;
  background:rgba(255,255,255,.05);
  pointer-events:none;
}

/* ── Tooltip */
.tooltip{
  position:fixed;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:8px 12px;
  font-size:12px;
  color:var(--text);
  pointer-events:none;
  z-index:200;
  opacity:0;
  transition:opacity .15s;
  max-width:200px;
  line-height:1.4;
}
.tooltip.show{opacity:1}

/* ── Hint */
.hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--text3);
  background:rgba(15,17,23,.7);
  padding:5px 14px;border-radius:20px;
  pointer-events:none;
  z-index:60;
}
</style>
</head>

const tooltip=document.getElementById('tooltip');

// ─── BUILD NODES ─────────────────────────────────────────
const nodeEls={};

nodes.forEach(n=>{
  const ph=PHASE_COLORS[n.phase];
  const el=document.createElement('div');
  el.className='node';
  el.id='node-'+n.id;
  el.style.cssText=`left:${n.x}px;top:${n.y}px;background:${ph.bg};border-color:${ph.dim}`;

  const roleTag=n.role==='both'?'both':n.role==='teacher'?'teacher':'student';
  const roleLabel=n.role==='both'?'Both':n.role==='teacher'?'Teacher':'Student';

  el.innerHTML=`
    <div class="node-phase" style="color:${ph.c}">${ph.label}</div>
    <div class="node-title">${n.title}</div>
    <div class="node-sub">${n.sub}</div>
    <div class="node-tags">
      <span class="node-tag ${roleTag}">${roleLabel}</span>
      ${n.teacher.some(t=>t.startsWith('[HOLD]'))?'<span class="node-tag hold">HOLD</span>':''}
    </div>`;

  el.addEventListener('click', e=>{ e.stopPropagation(); selectNode(n.id); });
  el.addEventListener('mouseenter', e=>{ showTooltip(e, n.title+'\n'+n.sub); });
  el.addEventListener('mouseleave', ()=>hideTooltip());
  el.addEventListener('mousemove', e=>moveTooltip(e));

  canvas.appendChild(el);
  nodeEls[n.id]=el;
});

// ─── BUILD SVG CONNECTIONS ────────────────────────────────
function getNodeCenter(id){
  const el=nodeEls[id];
  if(!el) return {x:0,y:0};
  return {
    x:parseInt(el.style.left)+el.offsetWidth/2,
    y:parseInt(el.style.top)+el.offsetHeight/2
  };
}

function buildConnections(){
  svgLayer.innerHTML='';
  const W=2000, H=800;
  svgLayer.setAttribute('width',W);
  svgLayer.setAttribute('height',H);

  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');

  connections.forEach((conn,i)=>{
    const ph=PHASE_COLORS[conn.type];
    const mid=document.createElementNS('http://www.w3.org/2000/svg','marker');
    mid.setAttribute('id','arr-'+i);
    mid.setAttribute('markerWidth','6');
    mid.setAttribute('markerHeight','4');
    mid.setAttribute('refX','6');
    mid.setAttribute('refY','2');
    mid.setAttribute('orient','auto');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0, 6 2, 0 4');
    poly.setAttribute('fill', getComputedColor(ph.c));
    mid.appendChild(poly);
    defs.appendChild(mid);
  });
  svgLayer.appendChild(defs);

  connections.forEach((conn,i)=>{
    const from=getNodeCenter(conn.from);
    const to=getNodeCenter(conn.to);
    const ph=PHASE_COLORS[conn.type];
    const color=getComputedColor(ph.c);

    const dx=to.x-from.x, dy=to.y-from.y;
    const cx1=from.x+dx*0.4, cy1=from.y;
    const cx2=to.x-dx*0.4, cy2=to.y;

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${from.x},${from.y} C${cx1},${cy1} ${cx2},${cy2} ${to.x},${to.y}`);
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-opacity','0.35');
    path.setAttribute('marker-end',`url(#arr-${i})`);
    path.setAttribute('stroke-dasharray','4 3');
    path.dataset.from=conn.from;
    path.dataset.to=conn.to;
    svgLayer.appendChild(path);

    // label
    const mx=(from.x+to.x)/2, my=(from.y+to.y)/2-8;
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',mx);txt.setAttribute('y',my);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','9');
    txt.setAttribute('fill',color);
    txt.setAttribute('opacity','0.5');
    txt.setAttribute('font-family','-apple-system,sans-serif');
    txt.textContent=conn.label;
    svgLayer.appendChild(txt);
  });
}

function getComputedColor(varStr){
  const map={
    'var(--r1)':'#3b82f6','var(--p1)':'#f59e0b',
    'var(--p2)':'#10b981','var(--p3)':'#8b5cf6','var(--p4)':'#f43f5e'
  };
  return map[varStr]||'#888';
}

// ─── SELECT / DETAIL ─────────────────────────────────────
function selectNode(id){
  if(selectedId===id){ closeDetail(); return; }
  selectedId=id;
  const n=nodes.find(x=>x.id===id);
  if(!n) return;
  const ph=PHASE_COLORS[n.phase];

  // highlight
  nodes.forEach(x=>{
    const el=nodeEls[x.id];
    const isConnected=n.connects.includes(x.id)||nodes.find(m=>m.id===n.id)?.connects?.includes(x.id);
    el.classList.toggle('selected', x.id===id);
    el.classList.toggle('dimmed', x.id!==id && !isConnected);
  });

  // highlight connections
  svgLayer.querySelectorAll('path').forEach(p=>{
    const active=p.dataset.from===id||p.dataset.to===id||
      (n.connects.includes(p.dataset.to)&&p.dataset.from===id)||
      (n.connects.includes(p.dataset.from)&&p.dataset.to===id);
    p.style.strokeOpacity=active?'0.9':'0.08';
    p.style.strokeWidth=active?'2.5':'1.5';
  });

  // populate detail
  document.getElementById('d-phase').style.color=ph.c;
  document.getElementById('d-phase').textContent=ph.label;
  document.getElementById('d-title').textContent=n.title;
  document.getElementById('d-obj').textContent=n.obj;

  const tList=document.getElementById('d-teacher');
  const sList=document.getElementById('d-student');

  if(n.teacher.length){
    document.getElementById('d-teacher-sec').style.display='block';
    tList.innerHTML=n.teacher.map(t=>{
      const hold=t.startsWith('[HOLD]');
      return `<li class="${hold?'hold-item':''}">${t}</li>`;
    }).join('');
  } else {
    document.getElementById('d-teacher-sec').style.display='none';
  }

  if(n.student.length){
    document.getElementById('d-student-sec').style.display='block';
    sList.innerHTML=n.student.map(s=>`<li>${s}</li>`).join('');
  } else {
    document.getElementById('d-student-sec').style.display='none';
  }

  const cList=document.getElementById('d-connects');
  cList.innerHTML=n.connects.map(cid=>{
    const cn=nodes.find(x=>x.id===cid);
    if(!cn) return '';
    const cph=PHASE_COLORS[cn.phase];
    return `<div class="conn-item" onclick="selectNode('${cid}')">
      <div class="conn-dot" style="background:${getComputedColor(cph.c)}"></div>
      <span>${cn.title}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text3)">${cph.label}</span>
    </div>`;
  }).join('');

  detail.classList.add('open');
}

function closeDetail(){
  selectedId=null;
  detail.classList.remove('open');
  nodes.forEach(n=>{
    nodeEls[n.id].classList.remove('selected','dimmed');
  });
  svgLayer.querySelectorAll('path').forEach(p=>{
    p.style.strokeOpacity='0.35';
    p.style.strokeWidth='1.5';
  });
}

wrap.addEventListener('click',()=>closeDetail());

// ─── PHASE TOGGLE ────────────────────────────────────────
function togglePhase(phase, btn){
  if(hiddenPhases.has(phase)){
    hiddenPhases.delete(phase);
    btn.classList.remove('dim');
  } else {
    hiddenPhases.add(phase);
    btn.classList.add('dim');
  }
  nodes.forEach(n=>{
    nodeEls[n.id].style.opacity=hiddenPhases.has(n.phase)?'0.08':'1';
    nodeEls[n.id].style.pointerEvents=hiddenPhases.has(n.phase)?'none':'all';
  });
  svgLayer.querySelectorAll('path').forEach(p=>{
    const fn=nodes.find(x=>x.id===p.dataset.from);
    const tn=nodes.find(x=>x.id===p.dataset.to);
    const hide=fn&&hiddenPhases.has(fn.phase)||tn&&hiddenPhases.has(tn.phase);
    p.style.opacity=hide?'0.03':'1';
  });
}

// ─── PAN / ZOOM ──────────────────────────────────────────
function applyTransform(){
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  updateMinimap();
}

wrap.addEventListener('mousedown',e=>{
  if(e.target===wrap||e.target===canvas||e.target===svgLayer){
    dragging=true; lastX=e.clientX; lastY=e.clientY;
    wrap.classList.add('grabbing');
  }
});
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  tx+=e.clientX-lastX; ty+=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup',()=>{ dragging=false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.92:1.08;
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  tx=(tx-mx)*delta+mx;
  ty=(ty-my)*delta+my;
  scale=Math.min(2,Math.max(0.25,scale*delta));
  applyTransform();
},{passive:false});

function resetView(){ tx=80; ty=60; scale=0.72; applyTransform(); }
function zoomIn(){ scale=Math.min(2,scale*1.15); applyTransform(); }
function zoomOut(){ scale=Math.max(0.25,scale*0.87); applyTransform(); }

// ─── TOOLTIP ─────────────────────────────────────────────
function showTooltip(e, text){
  tooltip.textContent=text;
  tooltip.classList.add('show');
  moveTooltip(e);
}
function hideTooltip(){ tooltip.classList.remove('show'); }
function moveTooltip(e){
  tooltip.style.left=(e.clientX+12)+'px';
  tooltip.style.top=(e.clientY-10)+'px';
}

// ─── MINIMAP ─────────────────────────────────────────────
function updateMinimap(){
  const mm=document.getElementById('mm-canvas');
  const ctx=mm.getContext('2d');
  const W=mm.width, H=mm.height;
  ctx.clearRect(0,0,W,H);

  const scaleX=W/1800, scaleY=H/700;
  const s=Math.min(scaleX,scaleY)*0.85;

  nodes.forEach(n=>{
    const ph=PHASE_COLORS[n.phase];
    const col=getComputedColor(ph.c);
    ctx.fillStyle=col+'44';
    ctx.strokeStyle=col+'88';
    ctx.lineWidth=0.5;
    ctx.beginPath();
    ctx.roundRect(n.x*s+8, n.y*s+4, 140*s, 60*s, 3);
    ctx.fill(); ctx.stroke();
  });

  // viewport indicator
  const vp=document.getElementById('mm-viewport');
  const ww=wrap.offsetWidth, wh=wrap.offsetHeight;
  const vpW=(ww/scale)*s, vpH=(wh/scale)*s;
  const vpX=(-tx/scale)*s+8, vpY=(-ty/scale)*s+4;
  vp.style.left=Math.max(0,vpX)+'px';
  vp.style.top=Math.max(0,vpY)+'px';
  vp.style.width=Math.min(W,vpW)+'px';
  vp.style.height=Math.min(H,vpH)+'px';
}

// ─── INIT ────────────────────────────────────────────────
setTimeout(()=>{
  buildConnections();
  applyTransform();
}, 100);
</script>
</body>
</html>
